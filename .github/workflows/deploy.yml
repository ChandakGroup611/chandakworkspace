name: Build and Deploy Next.js to Hostinger Node.js

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies and build
        env:
          NEXT_PUBLIC_SUPABASE_URL: "https://tkovzymkubxtpcgynkgd.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "sb_publishable_qpLThcWct0BnW88kuFEKEw_phOKNPwh"
        run: |
          npm install
          npm run build

      # Copy static assets into standalone folder so everything is self-contained
      - name: Prepare deployment files
        run: |
          cp -r public .next/standalone/public
          cp -r .next/static .next/standalone/.next/static
          cp server.js .next/standalone/server.js

      # Upload the compiled standalone files to Hostinger via FTP
      - name: Sync files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./.next/standalone/
          server-dir: /public_html/
