<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Chandak Workspace - Sign In</title>
    
    <!-- Import Google Fonts for a modern, sleek look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* 
         * CHANDAK WORKSPACE - AZURE AD CUSTOM BRANDING
         * Premium Dark Mode / Glassmorphism Aesthetic 
         */
        
        :root {
            --bg-primary: #05070D;
            --bg-surface: rgba(10, 13, 20, 0.7);
            --accent-primary: #8b5cf6; /* Purple */
            --accent-hover: #7c3aed;
            --text-primary: #ffffff;
            --text-muted: #9ca3af;
            --border-subtle: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(circle at 50% -20%, rgba(139, 92, 246, 0.15), transparent 60%);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Main Container */
        .auth-wrapper {
            width: 100%;
            max-width: 440px;
            padding: 2rem;
        }

        /* Glassmorphism Card */
        .auth-card {
            background: var(--bg-surface);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255,255,255,0.05) inset;
        }

        /* Header / Logo Area */
        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-logo {
            /* Replace with absolute URL to your logo if hosted elsewhere, e.g., https://yourdomain.com/logo.png */
            width: 80px;
            height: auto;
            margin-bottom: 1rem;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
        }

        .auth-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
            letter-spacing: -0.025em;
        }

        .auth-subtitle {
            font-size: 0.875rem;
            color: var(--text-muted);
            line-height: 1.5;
        }

        /* 
         * ==========================================
         * AZURE AD / ENTRA ID INJECTED ELEMENT STYLES 
         * Microsoft injects its form inside #api
         * ==========================================
         */
        
        #api {
            width: 100%;
        }

        /* Hide the default Microsoft Title since we have our own */
        #api .heading h1 {
            display: none !important;
        }

        /* Input Fields */
        #api input[type="text"],
        #api input[type="email"],
        #api input[type="password"] {
            width: 100%;
            height: 44px;
            padding: 0 1rem;
            margin-bottom: 1rem;
            background-color: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.875rem;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        #api input:focus {
            outline: none;
            border-color: var(--accent-primary);
            background-color: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.2);
        }

        #api input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        /* Labels */
        #api label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        /* Buttons */
        #api button, 
        #api .buttons button {
            width: 100%;
            height: 44px;
            background-color: var(--accent-primary);
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            margin-top: 0.5rem;
            box-shadow: 0 4px 14px 0 rgba(139, 92, 246, 0.39);
        }

        #api button:hover {
            background-color: var(--accent-hover);
            transform: translateY(-1px);
        }

        /* Error Messages */
        #api .error.pageLevel {
            background-color: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #fca5a5;
            padding: 0.75rem;
            border-radius: 8px;
            font-size: 0.875rem;
            margin-bottom: 1.5rem;
        }

        /* Links (Forgot Password, etc) */
        #api a {
            color: var(--accent-primary);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        #api a:hover {
            color: var(--accent-hover);
            text-decoration: underline;
        }

        /* Intro / Help Text */
        #api .intro p {
            color: var(--text-muted);
            font-size: 0.875rem;
            margin-bottom: 1.5rem;
        }

        /* Divider */
        .divider {
            position: relative;
            margin: 2rem 0;
            text-align: center;
        }
        
        .divider::before {
            content: "";
            position: absolute;
            left: 0;
            top: 50%;
            width: 100%;
            height: 1px;
            background: var(--border-subtle);
        }

        .divider span {
            position: relative;
            background: #0d1017;
            padding: 0 1rem;
            color: var(--text-muted);
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Registration Area */
        .register-area {
            text-align: center;
            font-size: 0.875rem;
            color: var(--text-muted);
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border-subtle);
        }

        .register-area a {
            color: var(--accent-primary);
            font-weight: 600;
            text-decoration: none;
            transition: color 0.2s;
        }

        .register-area a:hover {
            color: var(--accent-hover);
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            
            <!-- Branding Header -->
            <div class="auth-header">
                <!-- IMPORTANT: In a production Azure AD environment, you must use an absolute URL for the logo, e.g. https://yourdomain.com/logo.png -->
                <!-- Since we don't know the exact production domain, an SVG icon is embedded as a fallback if the image fails to load -->
                <svg class="auth-logo" style="width:48px; margin: 0 auto 1rem;" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#8b5cf6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
                    <path d="M2 17l10 5 10-5"></path>
                    <path d="M2 12l10 5 10-5"></path>
                </svg>
                
                <h1 class="auth-title">Chandak Workspace</h1>
                <p class="auth-subtitle">Identity Authentication Portal</p>
            </div>

            <!-- 
                =======================================================
                AZURE AD INJECTION POINT - DO NOT REMOVE
                Microsoft will dynamically inject the login form here
                =======================================================
            -->
            <div id="api" data-name="Unified">
                <!-- Fallback content (will be overwritten by Microsoft JS) -->
                <p style="text-align: center; color: #9ca3af; font-size: 14px;">Loading authentication module...</p>
            </div>
            
            <!-- Registration Link -->
            <div class="register-area">
                Don't have an account? 
                <!-- Replace with your actual production register URL -->
                <a href="http://localhost:3000/register">Create an Account</a>
            </div>

        </div>
    </div>
</body>
</html>
